<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Smart Task Management</title>
  <meta name="theme-color" content="#070b1a" />
  <meta name="description"
    content="TaskFlow: a smart task management system to create, filter, and track your tasks efficiently." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ANIMATED BACKGROUND -->
  <canvas id="bg-canvas"></canvas>
  <div class="portal-ring"></div>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <div>
          <h1 class="logo-title">TaskFlow</h1>
          <p class="logo-subtitle">Smart Task Management System</p>
        </div>
      </div>
      <div id="task-count" class="task-count"></div>
    </div>
  </header>

  <main class="main">

    <!-- TASK FORM -->
    <section class="card form-card" aria-label="Add new task">
      <h2 class="section-title">Add New Task</h2>
      <form id="task-form" novalidate>
        <div class="form-grid">
          <div class="field field--full">
            <label for="task-title">Title <span class="required">*</span></label>
            <input type="text" id="task-title" placeholder="What needs to be done?" required autocomplete="off" />
          </div>

          <div class="field field--full">
            <label for="task-desc">Description</label>
            <textarea id="task-desc" rows="2" placeholder="Optional details..."></textarea>
          </div>

          <div class="field">
            <label for="task-priority">Priority</label>
            <select id="task-priority">
              <option value="low">🟢 Low</option>
              <option value="medium" selected>🟠 Medium</option>
              <option value="high">🔴 High</option>
            </select>
          </div>

          <div class="field">
            <label for="task-due">Due Date</label>
            <input type="date" id="task-due" />
          </div>
        </div>

        <div id="form-error" class="form-error" role="alert" hidden></div>

        <button type="submit" id="add-btn" class="btn btn--primary">
          <span>+ Add Task</span>
        </button>
      </form>
    </section>

    <!-- FILTERS -->
    <section class="filters-bar" aria-label="Filter and search tasks">
      <div class="filter-group">
        <input type="search" id="search-input" placeholder="🔍  Search tasks..." autocomplete="off" />
      </div>
      <div class="filter-group">
        <label for="filter-status" class="sr-only">Filter by status</label>
        <select id="filter-status">
          <option value="all">All Statuses</option>
          <option value="pending">Pending</option>
          <option value="in-progress">In Progress</option>
          <option value="done">Done</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="filter-priority" class="sr-only">Filter by priority</label>
        <select id="filter-priority">
          <option value="all">All Priorities</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
    </section>

    <!-- TASK LIST -->
    <section aria-label="Task list">
      <div id="task-list" class="task-grid"></div>
    </section>

  </main>

  <footer class="footer">
    <p>Built with ☕ by <strong>TaskFlow</strong> &middot; Cloud Computing Project</p>
  </footer>

  <script src="bg.js"></script>
  <script src="app.js"></script>
</body>

</html>
