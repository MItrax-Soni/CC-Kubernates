apiVersion: v1
kind: Service
metadata:
  name: task-service
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
spec:
  type: LoadBalancer
  selector:
    app: task-manager
  ports:
    - port: 80
      targetPort: 3000