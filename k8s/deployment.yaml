apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-manager
  template:
    metadata:
      labels:
        app: task-manager
    spec:
      containers:
      - name: task-manager
        image: 797795454073.dkr.ecr.ap-south-1.amazonaws.com/task-manager:latest
        ports:
        - containerPort: 3000